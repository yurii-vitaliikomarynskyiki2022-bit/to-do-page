<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayFlow — Tasks & Weather</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --accent: #7c6aff;
      --accent2: #ff6a6a;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: #2e2e3e;
      --done: #3a3a4e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
      background-image: radial-gradient(ellipse at 20% 20%, #1e1540 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, #1a0f2e 0%, transparent 50%);
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      margin-bottom: 32px;
      animation: fadeDown 0.5s ease both;
    }
    .greeting {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #7c6aff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .date-line {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 4px;
      font-weight: 300;
    }

    /* WEATHER */
    .weather-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      animation: fadeDown 0.5s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }
    .weather-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(124,106,255,0.15), transparent 70%);
      pointer-events: none;
    }
    .weather-icon { font-size: 3rem; line-height: 1; }
    .weather-info { flex: 1; }
    .weather-temp {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1;
    }
    .weather-desc { color: var(--muted); font-size: 0.875rem; margin-top: 2px; text-transform: capitalize; }
    .weather-city { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }
    .weather-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
    }
    .weather-details span { white-space: nowrap; }

    .weather-loading {
      color: var(--muted);
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* API KEY INPUT */
    .api-setup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 24px;
      animation: fadeDown 0.5s 0.1s ease both;
    }
    .api-setup p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .api-setup p a { color: var(--accent); text-decoration: none; }
    .api-row { display: flex; gap: 8px; }
    .api-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      outline: none;
    }
    .api-input:focus { border-color: var(--accent); }
    .api-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    /* TASKS */
    .tasks-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      animation: fadeDown 0.5s 0.2s ease both;
    }
    .tasks-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .tasks-count {
      background: var(--surface2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* INPUT */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeDown 0.5s 0.25s ease both;
    }
    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .task-input::placeholder { color: var(--muted); }
    .task-input:focus { border-color: var(--accent); }
    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      width: 50px; height: 50px;
      font-size: 1.4rem;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, background 0.2s;
      flex-shrink: 0;
    }
    .add-btn:hover { transform: scale(1.08); background: #6a58f0; }
    .add-btn:active { transform: scale(0.95); }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      animation: fadeDown 0.5s 0.3s ease both;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* LIST */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.3s ease both;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .task-item.done {
      opacity: 0.5;
      border-color: transparent;
      background: var(--done);
    }
    .task-check {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .task-item.done .task-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check::after { content: '✓'; font-size: 0.7rem; color: #fff; opacity: 0; transition: opacity 0.2s; }
    .task-item.done .task-check::after { opacity: 1; }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: all 0.2s;
    }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .task-time { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }

    .task-del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .task-del:hover { color: var(--accent2); background: rgba(255,106,106,0.1); }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 40px 0;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* CLEAR BTN */
    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header>
    <div class="greeting" id="greeting">Привіт 👋</div>
    <div class="date-line" id="dateLine"></div>
  </header>

  <!-- WEATHER -->
  <div class="weather-card" id="weatherCard">
    <div class="weather-loading">
      <div class="spinner"></div>
      Отримую погоду...
    </div>
  </div>

  <!-- API SETUP (прихований за замовчуванням) -->
  <div class="api-setup" id="apiSetup" style="display:none">
    <p>
      Для відображення погоди потрібен безкоштовний API ключ від
      <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a>.
      Реєстрація безкоштовна, ключ приходить на пошту.
    </p>
    <div class="api-row">
      <input class="api-input" id="apiKeyInput" placeholder="Вставте API ключ сюди...">
      <button class="api-btn" onclick="saveApiKey()">Зберегти</button>
    </div>
  </div>

  <!-- TASKS -->
  <div class="tasks-header">
    <span class="tasks-title">Завдання</span>
    <span class="tasks-count" id="tasksCount">0 завдань</span>
  </div>

  <div class="input-row">
    <input class="task-input" id="taskInput" placeholder="Додати нове завдання..." maxlength="120">
    <button class="add-btn" onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Всі</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Активні</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Виконані</button>
  </div>

  <div class="task-list" id="taskList"></div>
  <button class="clear-btn" onclick="clearDone()">Очистити виконані</button>

</div>

<script>
// ─── СТАН ───────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('dayflow_tasks') || '[]');
let filter = 'all';
const API_KEY_STORE = 'dayflow_apikey';

// ─── ЗАГОЛОВОК ──────────────────────────────────────────
function initHeader() {
  const now = new Date();
  const h = now.getHours();
  const greet = h < 12 ? 'Доброго ранку ☀️' : h < 18 ? 'Гарного дня 👋' : 'Доброго вечора 🌙';
  document.getElementById('greeting').textContent = greet;

  const days = ['неділя','понеділок','вівторок','середа','четвер','п\'ятниця','субота'];
  const months = ['січня','лютого','березня','квітня','травня','червня',
                  'липня','серпня','вересня','жовтня','листопада','грудня'];
  document.getElementById('dateLine').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ─── ПОГОДА ─────────────────────────────────────────────
const WEATHER_ICONS = {
  'Clear': '☀️', 'Clouds': '☁️', 'Rain': '🌧️',
  'Drizzle': '🌦️', 'Thunderstorm': '⛈️', 'Snow': '❄️',
  'Mist': '🌫️', 'Fog': '🌫️', 'Haze': '🌫️'
};

async function loadWeather(lat, lon) {
  const key = localStorage.getItem(API_KEY_STORE);
  if (!key) { showApiSetup(); return; }

  try {
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${key}&units=metric&lang=uk`
    );
    if (!res.ok) { showApiSetup(); return; }
    const d = await res.json();

    const icon = WEATHER_ICONS[d.weather[0].main] || '🌡️';
    const temp = Math.round(d.main.temp);
    const feels = Math.round(d.main.feels_like);
    const desc = d.weather[0].description;
    const wind = Math.round(d.wind.speed);
    const hum = d.main.humidity;
    const city = d.name;

    document.getElementById('weatherCard').innerHTML = `
      <div class="weather-icon">${icon}</div>
      <div class="weather-info">
        <div class="weather-temp">${temp}°C</div>
        <div class="weather-desc">${desc}</div>
        <div class="weather-city">📍 ${city}</div>
      </div>
      <div class="weather-details">
        <span>💧 ${hum}%</span>
        <span>💨 ${wind} м/с</span>
        <span>Відчувається ${feels}°</span>
      </div>
    `;
  } catch(e) {
    showApiSetup();
  }
}

function showApiSetup() {
  document.getElementById('weatherCard').innerHTML =
    '<span style="color:var(--muted);font-size:.875rem">⚠️ Не вдалося завантажити погоду</span>';
  document.getElementById('apiSetup').style.display = 'block';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem(API_KEY_STORE, key);
  document.getElementById('apiSetup').style.display = 'none';
  document.getElementById('weatherCard').innerHTML =
    '<div class="weather-loading"><div class="spinner"></div>Отримую погоду...</div>';
  getLocation();
}

function getLocation() {
  if (!navigator.geolocation) { showApiSetup(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => loadWeather(pos.coords.latitude, pos.coords.longitude),
    ()  => loadWeather(50.4501, 30.5234) // Київ як запасний варіант
  );
}

// ─── ЗАДАЧІ ─────────────────────────────────────────────
function saveTasks() {
  localStorage.setItem('dayflow_tasks', JSON.stringify(tasks));
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;

  tasks.unshift({
    id: Date.now(),
    text,
    done: false,
    time: new Date().toLocaleTimeString('uk', { hour: '2-digit', minute: '2-digit' })
  });

  input.value = '';
  saveTasks();
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTasks();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function clearDone() {
  tasks = tasks.filter(t => !t.done);
  saveTasks();
  render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('taskList');
  const filtered = tasks.filter(t =>
    filter === 'all' ? true : filter === 'done' ? t.done : !t.done
  );

  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  document.getElementById('tasksCount').textContent =
    `${done}/${total} виконано`;

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        ${filter === 'done' ? 'Немає виконаних завдань' : 'Завдань немає — додай перше!'}
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="task-item ${t.done ? 'done' : ''}">
      <div class="task-check" onclick="toggleTask(${t.id})"></div>
      <span class="task-text">${t.text}</span>
      <span class="task-time">${t.time}</span>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    </div>
  `).join('');
}

// ─── ENTER ──────────────────────────────────────────────
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ─── СТАРТ ──────────────────────────────────────────────
initHeader();
getLocation();
render();
</script>
</body>
</html>
